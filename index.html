<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Decision Picker Pro++</title>
<style>
body{font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:linear-gradient(135deg,#74ebd5,#acb6e5);} 
.container{background:white;padding:20px;border-radius:16px;width:380px;text-align:center;box-shadow:0 10px 25px rgba(0,0,0,0.2);} 
input,select{padding:8px;border-radius:6px;border:1px solid #ccc;margin:2px;} 
button{padding:8px;border:none;border-radius:6px;cursor:pointer;margin:2px;} 
ul{list-style:none;padding:0;max-height:120px;overflow:auto;} 
li{background:#eee;margin:5px 0;padding:6px;border-radius:6px;display:flex;justify-content:space-between;align-items:center;} 
.remove{background:red;color:white;} 
#wheel{width:240px;height:240px;border-radius:50%;border:5px solid #333;margin:15px auto;position:relative;overflow:hidden;} 
.slice{position:absolute;width:50%;height:50%;top:50%;left:50%;transform-origin:0% 0%;display:flex;align-items:center;justify-content:center;font-size:10px;} 
#pointer{width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:22px solid black;margin:0 auto;} 
#dropZone{border:2px dashed #999;padding:10px;margin-top:5px;border-radius:6px;font-size:12px;} 
#ipBox{font-size:12px;margin-top:10px;color:#333;}
</style>
</head>
<body>
<div class="container">
<h2>Decision Picker</h2>

<input id="optionInput" placeholder="Option">
<input id="weightInput" type="number" placeholder="Weight" min="1" value="1" style="width:70px;">
<button onclick="addOption()">Add</button>

<select id="categorySelect"></select>
<button onclick="addCategory()">+Cat</button>

<input type="file" id="fileInput" accept=".txt">
<div id="dropZone">Drag & drop .txt file</div>

<ul id="list"></ul>

<button onclick="spin()">Spin</button>
<button onclick="exportData()">Export</button>
<button onclick="importData()">Import</button>

<div id="pointer"></div>
<div id="wheel"></div>
<div id="result"></div>

<div id="ipBox">IP: loading...</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('data')) || {options:[], categories:['Default'], logs:[]};
let currentRotation = 0;

function save(){ localStorage.setItem('data', JSON.stringify(data)); }

// Fetch public IP (client-side)
async function fetchIP(){
  try{
    let res = await fetch('https://api.ipify.org?format=json');
    let json = await res.json();
    document.getElementById('ipBox').textContent = 'IP: ' + json.ip;

    // log it locally
    data.logs.push({ip: json.ip, time: new Date().toISOString()});
    save();
  } catch {
    document.getElementById('ipBox').textContent = 'IP: unavailable';
  }
}

function addOption(){
  let val = optionInput.value.trim();
  let w = parseInt(weightInput.value)||1;
  let cat = categorySelect.value;
  if(!val) return;
  data.options.push({text:val, weight:w, cat});
  optionInput.value=''; save(); render();
}

function remove(i){ data.options.splice(i,1); save(); render(); }

function edit(i){
  let v = prompt('Edit:', data.options[i].text);
  if(v){ data.options[i].text=v; save(); render(); }
}

function addCategory(){
  let name = prompt('Category name');
  if(name){ data.categories.push(name); save(); render(); }
}

function render(){
  list.innerHTML='';
  categorySelect.innerHTML='';
  data.categories.forEach(c=>{
    let opt=document.createElement('option'); opt.textContent=c;
    categorySelect.appendChild(opt);
  });

  data.options.forEach((o,i)=>{
    let li=document.createElement('li');
    li.textContent=`${o.text} (${o.weight}) [${o.cat}]`;
    li.onclick=()=>edit(i);
    let b=document.createElement('button'); b.textContent='X'; b.className='remove';
    b.onclick=(e)=>{e.stopPropagation(); remove(i);} 
    li.appendChild(b);
    list.appendChild(li);
  });

  drawWheel();
}

function weightedPick(){
  let pool=[];
  data.options.forEach(o=>{
    for(let i=0;i<o.weight;i++) pool.push(o);
  });
  return pool[Math.floor(Math.random()*pool.length)];
}

function drawWheel(){
  wheel.innerHTML='';
  if(data.options.length===0) return;

  let totalWeight = data.options.reduce((a,b)=>a+b.weight,0);
  let start=0;

  data.options.forEach((o,i)=>{
    let angle = (o.weight/totalWeight)*360;
    let d=document.createElement('div');
    d.className='slice';
    d.style.background=`hsl(${i*360/data.options.length},70%,70%)`;
    d.style.transform=`rotate(${start}deg) skewY(${90-angle}deg)`;
    d.textContent=o.text;
    wheel.appendChild(d);
    start+=angle;
  });
}

function spin(){
  if(data.options.length===0) return;

  let picked = weightedPick();
  let index = data.options.indexOf(picked);

  let totalWeight = data.options.reduce((a,b)=>a+b.weight,0);
  let anglePerWeight = 360/totalWeight;

  let offset=0;
  for(let i=0;i<index;i++) offset+=data.options[i].weight;

  let stopAngle = 360 - (offset*anglePerWeight) - (data.options[index].weight*anglePerWeight)/2;

  currentRotation += 5*360 + stopAngle;

  wheel.style.transition='transform 2s cubic-bezier(.17,.67,.83,.67)';
  wheel.style.transform=`rotate(${currentRotation}deg)`;

  setTimeout(()=>{
    result.textContent = 'Result: '+ picked.text;
    playSound();
  },2000);
}

function playSound(){
  let ctx = new (window.AudioContext||window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  osc.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime+0.1);
}

function exportData(){ navigator.clipboard.writeText(JSON.stringify(data)); alert('Copied'); }
function importData(){
  let d=prompt('Paste JSON');
  try{ data=JSON.parse(d); save(); render(); }
  catch{ alert('Invalid'); }
}

fileInput.addEventListener('change', e=>handleFile(e.target.files[0]));

dropZone.addEventListener('dragover', e=>{e.preventDefault();});
dropZone.addEventListener('drop', e=>{
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
});

function handleFile(file){
  if(!file) return;
  let reader=new FileReader();
  reader.onload=()=>{
    let lines=reader.result.split(/\r?\n/).filter(l=>l.trim());
    lines.forEach(l=>data.options.push({text:l,weight:1,cat:'Default'}));
    save(); render();
  };
  reader.readAsText(file);
}

optionInput.addEventListener('keypress', e=>{ if(e.key==='Enter') addOption(); });

fetchIP();
render();
</script>
</body>
</html>
