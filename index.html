<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Decision Picker Pro+</title>
<style>
body {
  font-family: Arial;
  display:flex; justify-content:center; align-items:center;
  height:100vh; margin:0;
  background: linear-gradient(135deg,#74ebd5,#acb6e5);
}
.container {
  background:white; padding:20px; border-radius:16px;
  width:360px; text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
input { padding:8px; border-radius:6px; border:1px solid #ccc; }
button { padding:8px; border:none; border-radius:6px; cursor:pointer; margin:2px; }
ul { list-style:none; padding:0; max-height:120px; overflow:auto; }
li { background:#eee; margin:5px 0; padding:6px; border-radius:6px; display:flex; justify-content:space-between; }
.remove { background:red; color:white; }

#wheel {
  width:220px; height:220px; border-radius:50%;
  border:5px solid #333; margin:15px auto;
  position:relative; overflow:hidden;
}
.slice {
  position:absolute; width:50%; height:50%;
  top:50%; left:50%; transform-origin:0% 0%;
  display:flex; align-items:center; justify-content:center;
  font-size:10px;
}
#pointer {
  width:0; height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:20px solid black;
  margin:0 auto;
}
</style>
</head>
<body>
<div class="container">
<h2>Decision Picker</h2>

<input id="optionInput" placeholder="Enter option">
<button onclick="addOption()">Add</button>
<input type="file" id="fileInput" accept=".txt">

<ul id="list"></ul>

<button onclick="spin()">Spin</button>
<button onclick="exportData()">Export</button>
<button onclick="importData()">Import</button>

<div id="pointer"></div>
<div id="wheel"></div>
<div id="result"></div>
</div>

<script>
let options = JSON.parse(localStorage.getItem('opts'))||[];
let currentRotation = 0;

function save(){ localStorage.setItem('opts', JSON.stringify(options)); }

function addOption(){
  let val = optionInput.value.trim();
  if(!val) return;
  options.push(val);
  optionInput.value=''; save(); render();
}

function remove(i){ options.splice(i,1); save(); render(); }

function edit(i){
  let v = prompt('Edit:', options[i]);
  if(v){ options[i]=v; save(); render(); }
}

function render(){
  list.innerHTML='';
  options.forEach((o,i)=>{
    let li=document.createElement('li');
    li.textContent=o;
    li.onclick=()=>edit(i);
    let b=document.createElement('button');
    b.textContent='X'; b.className='remove';
    b.onclick=(e)=>{e.stopPropagation(); remove(i);} 
    li.appendChild(b);
    list.appendChild(li);
  });
  drawWheel();
}

function drawWheel(){
  wheel.innerHTML='';
  let n=options.length;
  if(n===0) return;
  let angle=360/n;
  options.forEach((o,i)=>{
    let d=document.createElement('div');
    d.className='slice';
    d.style.background=`hsl(${i*360/n},70%,70%)`;
    d.style.transform=`rotate(${i*angle}deg) skewY(${90-angle}deg)`;
    d.textContent=o;
    wheel.appendChild(d);
  });
}

function spin(){
  if(options.length===0) return;
  let n=options.length;
  let angle=360/n;

  let randIndex = Math.floor(Math.random()*n);
  let stopAngle = 360 - (randIndex*angle) - angle/2;

  let spins = 5*360;
  currentRotation += spins + stopAngle;

  wheel.style.transition='transform 2s cubic-bezier(.17,.67,.83,.67)';
  wheel.style.transform=`rotate(${currentRotation}deg)`;

  setTimeout(()=>{
    result.textContent = 'Result: '+ options[randIndex];
  },2000);
}

function exportData(){
  navigator.clipboard.writeText(JSON.stringify(options));
  alert('Copied');
}

function importData(){
  let data=prompt('Paste JSON');
  try{ options=JSON.parse(data); save(); render(); }
  catch{ alert('Invalid'); }
}

// file input support
fileInput.addEventListener('change', e=>{
  let file=e.target.files[0];
  if(!file) return;
  let reader=new FileReader();
  reader.onload = ()=>{
    let lines = reader.result.split(/\r?\n/).filter(l=>l.trim());
    options.push(...lines);
    save(); render();
  };
  reader.readAsText(file);
});

// enter key
optionInput.addEventListener('keypress', e=>{
  if(e.key==='Enter') addOption();
});

render();
</script>
</body>
</html>
