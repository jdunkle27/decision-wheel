<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Decision Picker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #74ebd5, #acb6e5);
      margin: 0;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      width: 320px;
      text-align: center;
    }

    input {
      width: 65%;
      padding: 8px;
      margin-right: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 8px 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
      transition: transform 0.1s, background 0.2s;
    }

    button:hover {
      background: #0056b3;
      transform: scale(1.05);
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }

    li {
      background: #eee;
      margin: 5px 0;
      padding: 6px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .remove {
      background: red;
      font-size: 12px;
      padding: 3px 6px;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
      font-size: 18px;
      min-height: 24px;
    }

    .spin {
      animation: spin 0.6s ease;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(10deg); }
      100% { transform: rotate(0deg); }
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <h2>Decision Picker</h2>

    <div>
      <input type="text" id="optionInput" placeholder="Enter option">
      <button onclick="addOption()">Add</button>
    </div>

    <ul id="optionsList"></ul>

    <button onclick="pickOption()" style="margin-top:10px;">Pick for me</button>

    <div id="result"></div>
  </div>

  <script>
    let options = JSON.parse(localStorage.getItem('options')) || [];

    function saveOptions() {
      localStorage.setItem('options', JSON.stringify(options));
    }

    function addOption() {
      const input = document.getElementById('optionInput');
      const value = input.value.trim();

      if (value === '') return;

      options.push(value);
      input.value = '';
      saveOptions();
      renderList();
    }

    function removeOption(index) {
      options.splice(index, 1);
      saveOptions();
      renderList();
    }

    function renderList() {
      const list = document.getElementById('optionsList');
      list.innerHTML = '';

      options.forEach((option, index) => {
        const li = document.createElement('li');
        li.textContent = option;

        const removeBtn = document.createElement('button');
        removeBtn.textContent = 'X';
        removeBtn.className = 'remove';
        removeBtn.onclick = () => removeOption(index);

        li.appendChild(removeBtn);
        list.appendChild(li);
      });
    }

    function pickOption() {
      const result = document.getElementById('result');
      const container = document.getElementById('container');

      if (options.length === 0) {
        result.textContent = 'Add some options first.';
        return;
      }

      container.classList.add('spin');

      setTimeout(() => {
        const randomIndex = Math.floor(Math.random() * options.length);
        result.textContent = 'You should choose: ' + options[randomIndex];
        container.classList.remove('spin');
      }, 500);
    }

    // Initial render
    renderList();
  </script>
</body>
</html>
